basePath: /api/v1
definitions:
  AdminLoginRequest:
    properties:
      id:
        type: string
      password:
        type: string
    type: object
  AdminLoginResponse:
    properties:
      accessToken:
        type: string
      expiresInSeconds:
        type: integer
    type: object
  AdminResponse:
    properties:
      id:
        type: string
      role:
        enum:
        - SYSTEM_ADMIN
        - CORNER_OPERATOR
        type: string
      username:
        type: string
    type: object
  AdminSessionResponse:
    properties:
      adminId:
        type: string
      createdAt:
        format: date-time
        type: string
      deviceInfo:
        type: string
      id:
        format: uuid
        type: string
      lastUsedAt:
        format: date-time
        type: string
    type: object
  AssignBadgeRequest:
    properties:
      groupId:
        type: string
    type: object
  AuditLogPageResponse:
    properties:
      logs:
        items:
          $ref: '#/definitions/AuditLogResponse'
        type: array
      nextCursor:
        type: string
    type: object
  AuditLogResponse:
    properties:
      action:
        enum:
        - ADMIN_LOGIN
        - ADMIN_CREATE
        - ADMIN_PASSWORD_CHANGE
        - ADMIN_DELETE
        - ADMIN_SESSION_REVOKE
        - TRACK_FORCE_LOGOUT
        - FACILITATOR_LOGIN
        - SESSION_MIGRATE
        - FACILITATOR_LOGOUT
        - BADGE_ASSIGN
        - BADGE_BULK_GENERATE
        - BADGE_EXPORT
        - CAMP_ACTIVATE
        - CAMP_END
        - CAMP_CREATE
        - CAMP_SETTINGS_UPDATE
        - CORNER_UPDATE
        - CORNER_DELETE
        - CORNER_CREATE
        - DEVICE_APPROVED
        - DEVICE_REJECTED
        - DEVICE_REVOKED
        - PIN_LOCK_RESET
        - DEVICE_REQUEST
        - GROUP_CREATE
        - MESSAGE_DIRECT
        - MESSAGE_BROADCAST
        - TRACK_CREATE
        - TRACK_DELETE
        - TRACK_REPLACE
        - PIN_REGENERATE
        - TRACK_PIN_EXPORT
        - VISIT_START
        - VISIT_COMPLETE
        type: string
      actor:
        type: string
      id:
        format: uuid
        type: string
      metadata:
        additionalProperties: true
        type: object
      occurredAt:
        format: date-time
        type: string
      success:
        type: boolean
      target:
        type: string
    type: object
  BadgeResponse:
    properties:
      assignedGroupId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      qrPayload:
        type: string
      shortId:
        example: B-0042
        type: string
      status:
        enum:
        - UNASSIGNED
        - ASSIGNED
        type: string
    type: object
  BottleneckRankingResponse:
    properties:
      avgDeviationSeconds:
        type: number
      cornerId:
        format: uuid
        type: string
      cornerName:
        type: string
    type: object
  BroadcastMessageRequest:
    properties:
      content:
        type: string
    type: object
  BroadcastReceiptResponse:
    properties:
      cornerName:
        type: string
      isRead:
        type: boolean
      readAt:
        format: date-time
        type: string
      trackId:
        format: uuid
        type: string
      trackNo:
        type: integer
    type: object
  BulkDeleteTracksRequest:
    properties:
      trackIds:
        items:
          type: string
        type: array
    type: object
  BulkGenerateBadgesRequest:
    properties:
      count:
        type: integer
    type: object
  BulkUpdateCornersRequest:
    properties:
      corners:
        items:
          properties:
            id:
              type: string
            name:
              type: string
            targetMinutes:
              type: integer
          type: object
        type: array
    type: object
  CampReportResponse:
    properties:
      campId:
        format: uuid
        type: string
      cornerStats:
        items:
          $ref: '#/definitions/CornerStatsResponse'
        type: array
      generatedAt:
        format: date-time
        type: string
      groupStats:
        items:
          $ref: '#/definitions/GroupStatsResponse'
        type: array
      operationalStats:
        $ref: '#/definitions/OperationalStatsResponse'
      summary:
        $ref: '#/definitions/CampSummaryStatsResponse'
      timeline:
        $ref: '#/definitions/TimelineStatsResponse'
      trackStats:
        items:
          $ref: '#/definitions/TrackStatsResponse'
        type: array
    type: object
  CampResponse:
    properties:
      bottleneckMinSamples:
        example: 3
        type: integer
      bottleneckRatioPct:
        example: 20
        type: integer
      endAt:
        format: date-time
        type: string
      id:
        format: uuid
        type: string
      name:
        example: 2026 여름 코너학습
        type: string
      registrationCode:
        example: 7ZQK3M2X
        type: string
      startAt:
        format: date-time
        type: string
      status:
        enum:
        - PENDING
        - ACTIVE
        - ENDED
        type: string
    type: object
  CampSummaryStatsResponse:
    properties:
      avgDeviationSeconds:
        type: number
      bottleneckRanking:
        items:
          $ref: '#/definitions/BottleneckRankingResponse'
        type: array
      completionRate:
        type: number
      exceptionApprovalCount:
        type: integer
      finishedGroupCount:
        type: integer
      manualVisitRatio:
        type: number
      programDurationSeconds:
        type: integer
      ruleOverrideCount:
        type: integer
      totalGroups:
        type: integer
      totalVisits:
        type: integer
      trackOperationCount:
        type: integer
      visitCompletionRate:
        type: number
    type: object
  ChangeAdminPasswordRequest:
    properties:
      password:
        type: string
    type: object
  CornerMetricResponse:
    properties:
      avgDurationSeconds:
        example: 640
        type: integer
      sampleCount:
        example: 15
        type: integer
    type: object
  CornerProgressResponse:
    properties:
      cornerId:
        format: uuid
        type: string
      cornerName:
        type: string
      status:
        enum:
        - NOT_VISITED
        - IN_PROGRESS
        - COMPLETED
        type: string
    type: object
  CornerResponse:
    properties:
      activeTracks:
        items:
          $ref: '#/definitions/TrackSummaryResponse'
        type: array
      campId:
        format: uuid
        type: string
      cornerMetric:
        $ref: '#/definitions/CornerMetricResponse'
      id:
        format: uuid
        type: string
      isBottleneck:
        type: boolean
      name:
        example: 코너 1
        type: string
      status:
        enum:
        - INACTIVE
        - IDLE
        - BUSY
        type: string
      targetMinutes:
        example: 10
        type: integer
    type: object
  CornerStatsResponse:
    properties:
      completedVisitCount:
        type: integer
      cornerId:
        format: uuid
        type: string
      cornerName:
        type: string
      overDeviationRatio:
        type: number
      unvisitedGroups:
        items:
          $ref: '#/definitions/UnvisitedGroupResponse'
        type: array
    type: object
  CreateAdminRequest:
    properties:
      password:
        type: string
      role:
        enum:
        - CORNER_OPERATOR
        type: string
      username:
        type: string
    type: object
  CreateCampRequest:
    properties:
      endAt:
        format: date-time
        type: string
      name:
        type: string
      startAt:
        format: date-time
        type: string
    type: object
  CreateCornerRequest:
    properties:
      campId:
        type: string
      name:
        type: string
      targetMinutes:
        type: integer
    type: object
  CreateTracksRequest:
    properties:
      campId:
        type: string
      cornerId:
        type: string
      count:
        type: integer
    type: object
  DeviceRegistrationCreatedResponse:
    properties:
      approvedAt:
        format: date-time
        type: string
      campId:
        format: uuid
        type: string
      createdAt:
        format: date-time
        type: string
      deviceModel:
        example: iPad Pro 11 2022
        type: string
      deviceName:
        example: 'iPad Pro #3'
        type: string
      deviceToken:
        example: a1b2c3...
        type: string
      displayName:
        example: 1번 태블릿
        type: string
      failedPinAttempts:
        type: integer
      id:
        format: uuid
        type: string
      lockedUntil:
        format: date-time
        type: string
      status:
        enum:
        - PENDING
        - APPROVED
        - REJECTED
        - REVOKED
        type: string
    type: object
  DeviceRegistrationRequest:
    properties:
      deviceModel:
        example: iPad Pro 11 2022
        type: string
      deviceName:
        type: string
      displayName:
        example: 1번 태블릿
        type: string
      registrationCode:
        description: 각 캠프에 유일하게 부여된 등록 코드입니다. 반드시 대문자로 작성합니다.
        example: 7ZQK3M2X
        type: string
      role:
        enum:
        - ADMIN
        - FACILITATOR
        type: string
    type: object
  DeviceRegistrationResponse:
    properties:
      approvedAt:
        format: date-time
        type: string
      campId:
        format: uuid
        type: string
      createdAt:
        format: date-time
        type: string
      deviceModel:
        example: iPad Pro 11 2022
        type: string
      deviceName:
        example: 'iPad Pro #3'
        type: string
      displayName:
        example: 1번 태블릿
        type: string
      failedPinAttempts:
        type: integer
      id:
        format: uuid
        type: string
      lockedUntil:
        format: date-time
        type: string
      status:
        enum:
        - PENDING
        - APPROVED
        - REJECTED
        - REVOKED
        type: string
    type: object
  DeviceStatusResponse:
    properties:
      campId:
        format: uuid
        type: string
      campStatus:
        enum:
        - PENDING
        - ACTIVE
        - ENDED
        type: string
      id:
        format: uuid
        type: string
      status:
        enum:
        - PENDING
        - APPROVED
        - REJECTED
        - REVOKED
        type: string
    type: object
  DirectMessageRequest:
    properties:
      content:
        type: string
    type: object
  ErrorResponse:
    properties:
      code:
        allOf:
        - $ref: '#/definitions/internal_infrastructure_web.ErrorCode'
        example: INVALID_REQUEST
      details:
        additionalProperties: true
        type: object
      message:
        example: 잘못된 요청입니다.
        type: string
    type: object
  ExportBadgesResponse:
    properties:
      badges:
        items:
          $ref: '#/definitions/BadgeResponse'
        type: array
    type: object
  ExportTracksResponse:
    properties:
      tracks:
        items:
          $ref: '#/definitions/TrackPinResponse'
        type: array
    type: object
  FacilitatorSessionResponse:
    properties:
      createdAt:
        format: date-time
        type: string
      id:
        format: uuid
        type: string
      trackId:
        format: uuid
        type: string
    type: object
  GroupResponse:
    properties:
      badgeId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      isFinished:
        type: boolean
      itinerary:
        items:
          $ref: '#/definitions/CornerProgressResponse'
        type: array
      name:
        example: 1조
        type: string
      status:
        enum:
        - IDLE_MOVING
        - AT_CORNER
        - FINISHED
        type: string
    type: object
  GroupStatsResponse:
    properties:
      completedCount:
        type: integer
      groupId:
        format: uuid
        type: string
      groupName:
        type: string
      totalDurationSeconds:
        type: integer
    type: object
  HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  MessageResponse:
    properties:
      channelType:
        enum:
        - BROADCAST
        - DIRECT
        type: string
      content:
        type: string
      id:
        format: uuid
        type: string
      isRead:
        description: IsRead and ReadAt represent the authenticated track's broadcast
          receipt on TrackAuth list responses.
        type: boolean
      readAt:
        description: ReadAt is omitted for unread broadcasts and administrator list
          responses.
        format: date-time
        type: string
      senderRole:
        enum:
        - ADMIN
        - TRACK
        type: string
      sentAt:
        format: date-time
        type: string
      trackId:
        format: uuid
        type: string
    type: object
  OperationalStatsResponse:
    type: object
  ReplaceTrackRequest:
    properties:
      newCornerId:
        type: string
    type: object
  SSENotification:
    properties:
      event:
        enum:
        - tracks_updated
        - track_updated
        - corners_updated
        - groups_updated
        - camp_updated
        - messages_changed
        - track_deleted
        - track_replaced
        - session_revoked
        - camp_ended
        - device_registration_updated
        - lockout_alert
        example: tracks_updated
        type: string
      scope:
        $ref: '#/definitions/SSEScope'
    type: object
  SSEScope:
    properties:
      kind:
        enum:
        - camp
        - track
        example: camp
        type: string
      trackId:
        format: uuid
        type: string
    type: object
  ScanAssignBadgeRequest:
    properties:
      groupName:
        type: string
      qrPayload:
        type: string
    type: object
  TimelineStatsResponse:
    type: object
  TrackLoginRequest:
    properties:
      pin:
        type: string
    type: object
  TrackLoginResponse:
    properties:
      corner:
        $ref: '#/definitions/CornerResponse'
      track:
        $ref: '#/definitions/TrackResponse'
      trackToken:
        type: string
    type: object
  TrackPinResponse:
    properties:
      pin:
        example: "482910"
        type: string
      track:
        $ref: '#/definitions/TrackResponse'
    type: object
  TrackResponse:
    properties:
      cornerId:
        format: uuid
        type: string
      currentVisit:
        $ref: '#/definitions/VisitSummaryResponse'
      id:
        format: uuid
        type: string
      operationalStatus:
        enum:
        - IDLE
        - BUSY
        type: string
      status:
        enum:
        - ACTIVE
        - DELETED
        type: string
      trackNo:
        type: integer
    type: object
  TrackStatsResponse:
    properties:
      avgDeviationSeconds:
        type: integer
      handledVisitCount:
        type: integer
      manualVisitRatio:
        type: number
      trackId:
        format: uuid
        type: string
      trackNo:
        type: integer
    type: object
  TrackSummaryResponse:
    properties:
      cornerId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      operationalStatus:
        enum:
        - IDLE
        - BUSY
        type: string
      status:
        enum:
        - ACTIVE
        - DELETED
        type: string
      trackNo:
        type: integer
    type: object
  UnreadCountResponse:
    properties:
      unreadCount:
        type: integer
    type: object
  UnvisitedGroupResponse:
    properties:
      groupId:
        format: uuid
        type: string
      groupName:
        type: string
    type: object
  UpdateCampRequest:
    properties:
      bottleneckMinSamples:
        type: integer
      bottleneckRatioPct:
        type: integer
      endAt:
        format: date-time
        type: string
      name:
        type: string
      startAt:
        format: date-time
        type: string
    type: object
  VisitStartRequest:
    properties:
      groupId:
        type: string
      method:
        enum:
        - MANUAL
        type: string
      qrToken:
        type: string
    type: object
  VisitSummaryResponse:
    properties:
      cornerId:
        format: uuid
        type: string
      deviationSeconds:
        type: integer
      durationSeconds:
        type: integer
      endedAt:
        format: date-time
        type: string
      groupId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      inputMethod:
        enum:
        - QR_SCAN
        - MANUAL
        type: string
      startedAt:
        format: date-time
        type: string
      status:
        enum:
        - IN_PROGRESS
        - COMPLETED
        type: string
      trackId:
        format: uuid
        type: string
    type: object
  internal_infrastructure_web.ErrorCode:
    enum:
    - BADGE_ALREADY_ASSIGNED
    - BADGE_NOT_ASSIGNED
    - BADGE_NOT_FOUND
    - BAD_REQUEST
    - CAMP_INVALID_SETTINGS
    - CAMP_NOT_ACTIVE
    - CAMP_NOT_AVAILABLE
    - CAMP_NOT_ENDED
    - CAMP_NOT_FOUND
    - CAMP_SETTINGS_LOCKED
    - CAMP_STATE_CONFLICT
    - CONFLICT
    - CORNER_NOT_FOUND
    - DEVICE_INVALID_TRANSITION
    - DEVICE_LOCKED
    - DEVICE_NOT_APPROVED
    - FORBIDDEN
    - GROUP_NOT_FOUND
    - HTTP_ERROR
    - INTERNAL_ERROR
    - INTERNAL_SERVER_ERROR
    - INVALID_PIN
    - INVALID_TRANSITION
    - ITINERARY_CONFLICT
    - NOT_FOUND
    - SESSION_REVOKED
    - TRACK_BUSY
    - TRACK_CONFLICT
    - TRACK_NOT_ACTIVE
    - TRACK_NOT_BUSY
    - TRACK_NOT_FOUND
    - TRACK_SCOPE_FORBIDDEN
    - UNAUTHORIZED
    type: string
    x-enum-varnames:
    - CodeBadgeAlreadyAssigned
    - CodeBadgeNotAssigned
    - CodeBadgeNotFound
    - CodeBadRequest
    - CodeCampInvalidSettings
    - CodeCampNotActive
    - CodeCampNotAvailable
    - CodeCampNotEnded
    - CodeCampNotFound
    - CodeCampSettingsLocked
    - CodeCampStateConflict
    - CodeConflict
    - CodeCornerNotFound
    - CodeDeviceInvalidTransition
    - CodeDeviceLocked
    - CodeDeviceNotApproved
    - CodeForbidden
    - CodeGroupNotFound
    - CodeHTTPError
    - CodeInternalError
    - CodeInternalServerError
    - CodeInvalidPin
    - CodeInvalidTransition
    - CodeItineraryConflict
    - CodeNotFound
    - CodeSessionRevoked
    - CodeTrackBusy
    - CodeTrackConflict
    - CodeTrackNotActive
    - CodeTrackNotBusy
    - CodeTrackNotFound
    - CodeTrackScopeForbidden
    - CodeUnauthorized
info:
  contact:
    name: Cornermon API Team
  description: 코너학습 운영 시스템(Cornermon) REST API 명세서. 모든 날짜/시간(date-time) 필드는 항상 UTC
    기준 ISO 8601 형식(YYYY-MM-DDTHH:mm:ssZ)으로 송수신됩니다.
  title: Cornermon API
  version: 1.0.0
paths:
  /admins:
    post:
      consumes:
      - application/json
      description: SYSTEM_ADMIN만 호출할 수 있습니다. 생성할 역할은 CORNER_OPERATOR로 고정되며, SYSTEM_ADMIN은
        다른 SYSTEM_ADMIN을 생성할 수 없습니다. 동일한 username은 생성할 수 없습니다.
      parameters:
      - description: 생성할 관리자
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/AdminResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 관리자 생성
      tags:
      - A. Auth & Device Trust
  /admins/{id}:
    delete:
      description: SYSTEM_ADMIN만 호출할 수 있습니다. 자기 자신은 삭제할 수 없으므로 마지막 SYSTEM_ADMIN 삭제
        요청은 성립하지 않습니다. 삭제 시 admin_sessions는 DB foreign key cascade로 함께 제거됩니다.
      parameters:
      - description: 관리자 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 관리자 삭제
      tags:
      - A. Auth & Device Trust
  /admins/{id}/password:
    patch:
      consumes:
      - application/json
      description: 대상 관리자 본인 또는 SYSTEM_ADMIN만 호출할 수 있습니다. 비밀번호 변경은 기존 세션을 즉시 무효화하지
        않으며, 현재 access token은 기존 TTL까지 유효합니다.
      parameters:
      - description: 관리자 ID
        in: path
        name: id
        required: true
        type: string
      - description: 새 비밀번호
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ChangeAdminPasswordRequest'
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 관리자 비밀번호 변경
      tags:
      - A. Auth & Device Trust
  /api/v1/camps/{campId}/events/admin:
    get:
      description: 관리자용 best-effort 변경 알림 스트림입니다. 각 event의 data는 SSENotification JSON이며
        예시는 {"event":"tracks_updated","scope":{"kind":"camp"}} 입니다. 이벤트에는 상태 스냅샷이
        없으므로 수신한 관리자는 해당 REST API로 최신 상태를 조회합니다. `camp_ended`도 관리자는 REST 재조회할 수 있습니다.
        서버는 유실된 메시지를 저장·재전송하지 않으며, 버퍼가 찬 연결은 종료됩니다. 재연결 후 REST API로 최신 상태를 다시 조회해야
        합니다.
      parameters:
      - description: 캠프 ID
        in: path
        name: campId
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream data payload
          schema:
            $ref: '#/definitions/SSENotification'
      security:
      - AdminAuth: []
      summary: Admin SSE Stream
      tags:
      - F. Events (SSE)
  /api/v1/events/track/{trackId}:
    get:
      description: '트랙 진행자용 best-effort 변경 알림 스트림입니다. 각 event의 data는 SSENotification
        JSON이며 예시는 {"event":"track_updated","scope":{"kind":"track","trackId":"track-id"}}
        입니다. 일반 이벤트에는 상태 스냅샷이 없으므로 REST API로 최신 상태를 조회합니다. 단, `camp_ended`는 terminal
        event이므로 REST 재조회 없이 로컬 진행자 세션·기기 등록을 삭제하고 등록 화면으로 이동합니다. 이벤트 도착·순서는 판정 근거가
        아니며, 일반 재조회가 SESSION_REVOKED/401로 실패하거나 SSE를 놓치면 GET /device-registrations/me의
        status와 campStatus로 최종 복구합니다: APPROVED/ACTIVE는 PIN 세션만 종료, REVOKED/ENDED는
        캠프 종료, REVOKED/그 외는 기기 신뢰 회수입니다. 서버는 유실된 메시지를 저장·재전송하지 않습니다.'
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream data payload
          schema:
            $ref: '#/definitions/SSENotification'
      security:
      - TrackAuth: []
      summary: Track SSE Stream
      tags:
      - F. Events (SSE)
  /audit-logs:
    get:
      description: 시스템에서 발생한 중요 행위(인증, 방문, 예외 처리 등)의 감사 로그를 조회한다.
      parameters:
      - description: 행위자 부분 일치
        in: query
        name: actor
        type: string
      - description: 행위 종류 정확히 일치
        enum:
        - ADMIN_LOGIN
        - ADMIN_CREATE
        - ADMIN_PASSWORD_CHANGE
        - ADMIN_DELETE
        - ADMIN_SESSION_REVOKE
        - TRACK_FORCE_LOGOUT
        - FACILITATOR_LOGIN
        - SESSION_MIGRATE
        - FACILITATOR_LOGOUT
        - BADGE_ASSIGN
        - BADGE_BULK_GENERATE
        - BADGE_EXPORT
        - CAMP_ACTIVATE
        - CAMP_END
        - CAMP_CREATE
        - CAMP_SETTINGS_UPDATE
        - CORNER_UPDATE
        - CORNER_DELETE
        - CORNER_CREATE
        - DEVICE_APPROVED
        - DEVICE_REJECTED
        - DEVICE_REVOKED
        - PIN_LOCK_RESET
        - DEVICE_REQUEST
        - GROUP_CREATE
        - MESSAGE_DIRECT
        - MESSAGE_BROADCAST
        - TRACK_CREATE
        - TRACK_DELETE
        - TRACK_REPLACE
        - PIN_REGENERATE
        - TRACK_PIN_EXPORT
        - VISIT_START
        - VISIT_COMPLETE
        in: query
        name: action
        type: string
      - description: 처리 결과
        enum:
        - success
        - failure
        in: query
        name: result
        type: string
      - default: 50
        description: 조회 개수
        in: query
        name: limit
        type: integer
      - description: 이전 응답의 불투명 nextCursor
        in: query
        name: before
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/AuditLogPageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 감사 로그 조회
      tags:
      - G. Audit Logs
