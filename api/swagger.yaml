      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/CampReportResponse'
        "404":
          description: 'CAMP_NOT_FOUND: 캠프가 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
