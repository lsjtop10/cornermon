      - B. Resource Management (Admin)
  /camps/{id}:
    get:
      description: 특정 캠프 정보를 조회한다.
      parameters:
      - description: 캠프 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CampResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 캠프 상세 조회
      tags:
      - B. Resource Management (Admin)
    patch:
      consumes:
      - application/json
      description: 캠프 이름, 예정 기간, 병목 판정 기준 중 요청에 포함된 필드만 수정한다. 종료된 캠프는 수정할 수 없다.
      parameters:
      - description: 캠프 ID
        in: path
        name: id
        required: true
        type: string
      - description: 부분 수정할 캠프 설정
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateCampRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CampResponse'
        "400":
          description: 'CAMP_INVALID_SETTINGS: 설정 값이 유효하지 않음'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: 'CAMP_NOT_FOUND: 대상 캠프가 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: 'CAMP_SETTINGS_LOCKED: 종료된 캠프는 수정할 수 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
