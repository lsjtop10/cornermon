          description: 'INVALID_TRANSITION: 종료된 캠프에는 기기를 등록할 수 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: 'CAMP_NOT_FOUND: 등록 코드에 해당하는 캠프가 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
