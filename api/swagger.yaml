        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: 'CAMP_STATE_CONFLICT: 현재 캠프 상태에서는 코너를 삭제할 수 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
