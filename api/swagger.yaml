        승인 상태·식별자와 소속 캠프 상태를 조회한다. PENDING 및 REVOKED 상태에서도 호출할 수 있다.
      parameters:
      - description: 기기 등록 토큰 (opaque token, POST /device-registrations 응답의 deviceToken
          값)
