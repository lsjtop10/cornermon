        required: true
        type: string
      - description: 대상 코너
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ReplaceTrackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TrackPinResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 트랙 교체 (비상용)
      tags:
      - B. Resource Management (Admin)
  /tracks/{trackId}/corner:
    get:
      description: 인증된 진행자(TrackAuth)의 트랙이 속한 코너의 핵심 정보를 조회한다. 세션의 트랙과 path trackId가
        일치해야 한다. 다른 트랙의 활성 목록·병목 지표 등 관리자 전용 정보는 포함하지 않는다.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/CornerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: 세션 트랙과 요청 트랙 불일치
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: 트랙 또는 코너 없음
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - TrackAuth: []
      summary: 진행자 코너 조회
      tags:
      - C. Visit (Scan Flow)
  /tracks/{trackId}/groups:
    get:
      description: 인증된 진행자의 트랙이 속한 캠프의 조 목록을 반환한다. 세션의 트랙과 path trackId가 일치해야 한다.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/GroupResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: 'TRACK_SCOPE_FORBIDDEN: 세션 트랙과 요청 트랙이 불일치'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: 트랙 또는 코너 없음
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - TrackAuth: []
      summary: 진행자 수동 체크인용 조 목록 조회
      tags:
      - C. Visit (Scan Flow)
  /tracks/{trackId}/messages:
    get:
      description: 관리자 또는 자신의 트랙 진행자가 DIRECT 메시지 내역을 조회한다.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      - description: true면 상대측이 보낸 미확인 메시지를 읽음 처리
        in: query
        name: background
        type: boolean
      - description: RFC3339 UTC 이후 메시지만 반환
        in: query
        name: after
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/MessageResponse'
            type: array
        "403":
          description: 'TRACK_SCOPE_FORBIDDEN: 세션 트랙과 요청 트랙이 불일치'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      - TrackAuth: []
      summary: 트랙별 메시지 내역 조회
      tags:
      - E. Message
    post:
      consumes:
      - application/json
      description: 관리자가 특정 트랙에, 또는 특정 트랙이 관리자에게 DIRECT 메시지를 발송한다.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      - description: 메시지 내용
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/DirectMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/MessageResponse'
      security:
      - AdminAuth: []
      summary: 다이렉트 메시지 발송
      tags:
      - E. Message
  /tracks/{trackId}/messages/unread-count:
    get:
      description: 호출자(관리자 또는 진행자) 기준으로 상대측이 보낸 미확인 메시지 개수를 반환한다.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/UnreadCountResponse'
        "403":
          description: 'TRACK_SCOPE_FORBIDDEN: 세션 트랙과 요청 트랙이 불일치'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      - TrackAuth: []
      summary: 트랙 미확인 다이렉트 메시지 개수 조회
      tags:
      - E. Message
  /tracks/{trackId}/visits/current:
    get:
      description: 스캐너 앱이 크래시되거나 새로고침 되었을 때, 현재 트랙에서 진행 중인 방문이 있는지 확인.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/VisitSummaryResponse'
        "401":
          description: 'SESSION_REVOKED: 진행자 세션이 취소됨'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: 'VISIT_NOT_FOUND: 진행 중인 방문 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - TrackAuth: []
      summary: 현재 진행 중인 방문 상태 조회
      tags:
      - C. Visit (Scan Flow)
  /tracks/{trackId}/visits/current/end:
    post:
      description: 진행 중인 방문을 종료 처리한다. (화면의 종료 확인 2회 탭)
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/VisitSummaryResponse'
        "401":
          description: 'SESSION_REVOKED: 진행자 세션이 취소됨'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: 'TRACK_NOT_BUSY, TRACK_NOT_ACTIVE, ITINERARY_CONFLICT: 현재 운영
            상태에서 방문을 종료할 수 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - TrackAuth: []
      summary: 현재 방문 종료 (조 퇴장)
      tags:
      - C. Visit (Scan Flow)
  /tracks/{trackId}/visits/start:
    post:
      consumes:
      - application/json
      description: 진행자가 조의 입장을 처리한다. QR 스캔 또는 수동 처리.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      - description: 입장 방식 및 페이로드
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/VisitStartRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/VisitSummaryResponse'
        "401":
          description: 'SESSION_REVOKED: 진행자 세션이 취소됨'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: 'BADGE_NOT_ASSIGNED: 배지가 존재하지 않거나 조에 배정되지 않음'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: 'TRACK_BUSY, TRACK_NOT_ACTIVE, ITINERARY_CONFLICT, CAMP_NOT_ACTIVE:
            현재 운영 상태에서 방문을 시작할 수 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - TrackAuth: []
      summary: 방문 시작 (조 입장)
      tags:
      - C. Visit (Scan Flow)
  /tracks/bulk-delete:
    delete:
      consumes:
      - application/json
      description: 선택한 트랙들을 일괄 삭제한다.
      parameters:
      - description: 삭제할 트랙 ID 목록
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/BulkDeleteTracksRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 성공적으로 삭제됨
        "404":
          description: 'TRACK_NOT_FOUND: 대상 트랙이 없거나 이미 삭제됨'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: 'TRACK_DELETE_BLOCKED: 진행 중인 방문이 있어 삭제할 수 없음'
          schema:
            $ref: '#/definitions/ErrorResponse'
      security:
      - AdminAuth: []
      summary: 트랙 일괄 삭제
      tags:
      - B. Resource Management (Admin)
  /tracks/export:
    get:
      description: 인쇄를 위해 지정 캠프의 ACTIVE 트랙 PIN을 JSON으로 내려준다.
      parameters:
      - description: 캠프 ID
        in: query
        name: campId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ExportTracksResponse'
      security:
      - AdminAuth: []
      summary: 트랙 인증 정보 전체 내보내기
      tags:
      - B. Resource Management (Admin)
securityDefinitions:
  AdminAuth:
    description: 관리자 액세스 토큰 (ADMIN) — 슬라이딩 세션, 활동 시 12시간 단위로 만료 연장
    in: header
    name: Authorization
    type: apiKey
  TrackAuth:
    description: 트랙 세션 토큰 (TRACK) — 진행자가 PIN 로그인 후 발급
    in: header
    name: Authorization
    type: apiKey
  TrustedDeviceAuth:
    description: 관리자 승인된 기기 신뢰 토큰 (TRUSTED_DEVICE) — opaque token, 값을 그대로 전달
    in: header
    name: X-Device-Token
    type: apiKey
swagger: "2.0"
