        "400":
          description: 'INVALID_PIN: PIN이 올바르지 않음'
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: 'DEVICE_NOT_APPROVED: 기기가 승인되지 않음; CAMP_NOT_AVAILABLE: 캠프가
