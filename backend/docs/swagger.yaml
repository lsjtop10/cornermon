definitions:
  web.AdminLoginRequest:
    properties:
      id:
        type: string
      password:
        type: string
    type: object
  web.AdminLoginResponse:
    properties:
      accessToken:
        type: string
      expiresInSeconds:
        type: integer
      refreshToken:
        type: string
    type: object
  web.AdminRefreshResponse:
    properties:
      accessToken:
        type: string
      expiresInSeconds:
        type: integer
    type: object
  web.AdminSession:
    properties:
      adminId:
        type: string
      createdAt:
        format: date-time
        type: string
      deviceInfo:
        type: string
      id:
        format: uuid
        type: string
      lastUsedAt:
        format: date-time
        type: string
    type: object
  web.AssignBadgeRequest:
    properties:
      groupId:
        type: string
    type: object
  web.AuditLog:
    properties:
      action:
        type: string
      actor:
        type: string
      id:
        format: uuid
        type: string
      metadata:
        additionalProperties: true
        type: object
      occurredAt:
        format: date-time
        type: string
      success:
        type: boolean
      target:
        type: string
    type: object
  web.Badge:
    properties:
      assignedGroupId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      qrPayload:
        type: string
      shortId:
        example: B-0042
        type: string
      status:
        enum:
        - UNASSIGNED
        - ASSIGNED
        type: string
    type: object
  web.BottleneckRanking:
    properties:
      avgDeviationSeconds:
        type: number
      cornerId:
        format: uuid
        type: string
      cornerName:
        type: string
    type: object
  web.BroadcastMessageRequest:
    properties:
      campId:
        type: string
      content:
        type: string
    type: object
  web.BroadcastReceipt:
    properties:
      cornerName:
        type: string
      isRead:
        type: boolean
      readAt:
        format: date-time
        type: string
      trackId:
        format: uuid
        type: string
      trackNo:
        type: integer
    type: object
  web.BulkDeleteTracksRequest:
    properties:
      trackIds:
        items:
          type: string
        type: array
    type: object
  web.BulkGenerateBadgesRequest:
    properties:
      count:
        type: integer
    type: object
  web.BulkUpdateCornersRequest:
    properties:
      corners:
        items:
          properties:
            id:
              type: string
            name:
              type: string
            targetMinutes:
              type: integer
          type: object
        type: array
    type: object
  web.Camp:
    properties:
      bottleneckMinSamples:
        example: 3
        type: integer
      bottleneckRatioPct:
        example: 20
        type: integer
      endAt:
        format: date-time
        type: string
      id:
        format: uuid
        type: string
      name:
        example: 2026 여름 코너학습
        type: string
      startAt:
        format: date-time
        type: string
      status:
        enum:
        - PENDING
        - ACTIVE
        - ENDED
        type: string
    type: object
  web.CampReport:
    properties:
      campId:
        format: uuid
        type: string
      cornerStats:
        items:
          $ref: '#/definitions/web.CornerStats'
        type: array
      generatedAt:
        format: date-time
        type: string
      groupStats:
        items:
          $ref: '#/definitions/web.GroupStats'
        type: array
      operationalStats:
        $ref: '#/definitions/web.OperationalStats'
      summary:
        $ref: '#/definitions/web.CampSummaryStats'
      timeline:
        $ref: '#/definitions/web.TimelineStats'
      trackStats:
        items:
          $ref: '#/definitions/web.TrackStats'
        type: array
    type: object
  web.CampSummaryStats:
    properties:
      avgDeviationSeconds:
        type: number
      bottleneckRanking:
        items:
          $ref: '#/definitions/web.BottleneckRanking'
        type: array
      completionRate:
        type: number
      exceptionApprovalCount:
        type: integer
      finishedGroupCount:
        type: integer
      manualVisitRatio:
        type: number
      programDurationSeconds:
        type: integer
      ruleOverrideCount:
        type: integer
      totalGroups:
        type: integer
      totalVisits:
        type: integer
      trackOperationCount:
        type: integer
      visitCompletionRate:
        type: number
    type: object
  web.Corner:
    properties:
      activeTracks:
        items:
          $ref: '#/definitions/web.TrackSummary'
        type: array
      id:
        format: uuid
        type: string
      isBottleneck:
        type: boolean
      name:
        example: 코너 1
        type: string
      status:
        enum:
        - INACTIVE
        - IDLE
        - BUSY
        type: string
      targetMinutes:
        example: 10
        type: integer
    type: object
  web.CornerProgress:
    properties:
      cornerId:
        format: uuid
        type: string
      cornerName:
        type: string
      status:
        enum:
        - NOT_VISITED
        - IN_PROGRESS
        - COMPLETED
        type: string
    type: object
  web.CornerStats:
    properties:
      completedVisitCount:
        type: integer
      cornerId:
        format: uuid
        type: string
      cornerName:
        type: string
      unvisitedGroups:
        items:
          $ref: '#/definitions/web.UnvisitedGroup'
        type: array
    type: object
  web.CreateCampRequest:
    properties:
      name:
        type: string
    type: object
  web.CreateCornerRequest:
    properties:
      campId:
        type: string
      name:
        type: string
      targetMinutes:
        type: integer
    type: object
  web.CreateTracksRequest:
    properties:
      campId:
        type: string
      cornerId:
        type: string
      count:
        type: integer
    type: object
  web.DeviceRegistration:
    properties:
      approvedAt:
        format: date-time
        type: string
      createdAt:
        format: date-time
        type: string
      deviceName:
        example: 'iPad Pro #3'
        type: string
      id:
        format: uuid
        type: string
      status:
        enum:
        - PENDING
        - APPROVED
        - REJECTED
        - REVOKED
        type: string
    type: object
  web.DeviceRegistrationRequest:
    properties:
      campId:
        description: Using campId because RequestRegistration expects a campID
        type: string
      deviceName:
        type: string
      role:
        enum:
        - ADMIN
        - FACILITATOR
        type: string
    type: object
  web.DirectMessageRequest:
    properties:
      content:
        type: string
    type: object
  web.ErrorResponse:
    properties:
      code:
        example: INVALID_REQUEST
        type: string
      details:
        additionalProperties: true
        type: object
      message:
        example: 잘못된 요청입니다.
        type: string
    type: object
  web.ExportBadgesResponse:
    properties:
      badges:
        items:
          $ref: '#/definitions/web.Badge'
        type: array
    type: object
  web.Group:
    properties:
      badgeId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      isFinished:
        type: boolean
      itinerary:
        items:
          $ref: '#/definitions/web.CornerProgress'
        type: array
      name:
        example: 1조
        type: string
      status:
        enum:
        - IDLE_MOVING
        - AT_CORNER
        - FINISHED
        type: string
    type: object
  web.GroupStats:
    properties:
      completedCount:
        type: integer
      groupId:
        format: uuid
        type: string
      groupName:
        type: string
      totalDurationSeconds:
        type: integer
    type: object
  web.Message:
    properties:
      channelType:
        enum:
        - BROADCAST
        - DIRECT
        type: string
      content:
        type: string
      id:
        format: uuid
        type: string
      isRead:
        type: boolean
      readAt:
        format: date-time
        type: string
      senderRole:
        enum:
        - ADMIN
        - TRACK
        type: string
      sentAt:
        format: date-time
        type: string
      trackId:
        format: uuid
        type: string
    type: object
  web.OperationalStats:
    type: object
  web.ScanAssignBadgeRequest:
    properties:
      groupName:
        type: string
      qrPayload:
        type: string
    type: object
  web.TimelineStats:
    type: object
  web.Track:
    properties:
      cornerId:
        format: uuid
        type: string
      currentVisit:
        $ref: '#/definitions/web.VisitSummary'
      id:
        format: uuid
        type: string
      operationalStatus:
        enum:
        - IDLE
        - BUSY
        type: string
      pin:
        example: "482910"
        type: string
      status:
        enum:
        - ACTIVE
        - DELETED
        type: string
      trackNo:
        type: integer
    type: object
  web.TrackLoginRequest:
    properties:
      pin:
        type: string
    type: object
  web.TrackLoginResponse:
    properties:
      corner:
        $ref: '#/definitions/web.Corner'
      track:
        $ref: '#/definitions/web.Track'
      trackToken:
        type: string
    type: object
  web.TrackStats:
    properties:
      avgDeviationSeconds:
        type: integer
      handledVisitCount:
        type: integer
      manualVisitRatio:
        type: number
      trackId:
        format: uuid
        type: string
      trackNo:
        type: integer
    type: object
  web.TrackSummary:
    properties:
      cornerId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      operationalStatus:
        enum:
        - IDLE
        - BUSY
        type: string
      status:
        enum:
        - ACTIVE
        - DELETED
        type: string
      trackNo:
        type: integer
    type: object
  web.UnvisitedGroup:
    properties:
      groupId:
        format: uuid
        type: string
      groupName:
        type: string
    type: object
  web.VisitStartRequest:
    properties:
      groupId:
        type: string
      method:
        enum:
        - MANUAL
        type: string
      qrToken:
        type: string
    type: object
  web.VisitSummary:
    properties:
      cornerId:
        format: uuid
        type: string
      deviationSeconds:
        type: integer
      durationSeconds:
        type: integer
      endedAt:
        format: date-time
        type: string
      groupId:
        format: uuid
        type: string
      id:
        format: uuid
        type: string
      inputMethod:
        enum:
        - QR_SCAN
        - MANUAL
        type: string
      startedAt:
        format: date-time
        type: string
      status:
        enum:
        - IN_PROGRESS
        - COMPLETED
        type: string
      trackId:
        format: uuid
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/events/admin:
    get:
      description: 관리자용 실시간 이벤트 스트림
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream
      security:
      - AdminAuth: []
      summary: Admin SSE Stream
      tags:
      - F. Events (SSE)
  /api/v1/events/track/{trackId}:
    get:
      description: 트랙 진행자용 실시간 이벤트 스트림
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE Stream
      security:
      - TrackAuth: []
      summary: Track SSE Stream
      tags:
      - F. Events (SSE)
  /audit-logs:
    get:
      description: 시스템에서 발생한 중요 행위(인증, 방문, 예외 처리 등)의 감사 로그를 조회한다.
      parameters:
      - default: 50
        description: 조회 개수
        in: query
        name: limit
        type: integer
      - default: 0
        description: 오프셋
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.AuditLog'
            type: array
      security:
      - AdminAuth: []
      summary: 감사 로그 조회
      tags:
      - G. Audit Logs
  /auth/admin/login:
    post:
      consumes:
      - application/json
      description: 관리자 ID/비밀번호로 로그인하여 액세스 토큰과 리프레시 토큰을 발급받는다.
      parameters:
      - description: 로그인 정보
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 로그인 성공
          schema:
            $ref: '#/definitions/web.AdminLoginResponse'
        "401":
          description: 잘못된 ID 또는 비밀번호
          schema:
            $ref: '#/definitions/web.ErrorResponse'
      summary: 관리자 로그인
      tags:
      - A. Auth & Device Trust
  /auth/admin/logout:
    post:
      description: 현재 활성화된 리프레시 토큰(세션)을 취소(Revoke)한다.
      produces:
      - application/json
      responses:
        "204":
          description: 로그아웃 성공
        "401":
          description: 권한 없음
          schema:
            $ref: '#/definitions/web.ErrorResponse'
      security:
      - AdminAuth: []
      summary: 관리자 로그아웃
      tags:
      - A. Auth & Device Trust
  /auth/admin/refresh:
    post:
      description: 리프레시 토큰으로 새 액세스 토큰을 발급한다.
      produces:
      - application/json
      responses:
        "200":
          description: 새 액세스 토큰 발급
          schema:
            $ref: '#/definitions/web.AdminRefreshResponse'
        "401":
          description: 권한 없음
          schema:
            $ref: '#/definitions/web.ErrorResponse'
      security:
      - AdminRefreshAuth: []
      summary: 관리자 액세스 토큰 재발급
      tags:
      - A. Auth & Device Trust
  /auth/admin/sessions:
    get:
      description: 현재 로그인된 관리자 세션 목록을 반환한다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.AdminSession'
            type: array
      security:
      - AdminAuth: []
      summary: 관리자 세션 목록 조회
      tags:
      - A. Auth & Device Trust
  /auth/admin/sessions/{id}/revoke:
    post:
      description: 특정 관리자 세션을 강제 만료 처리한다.
      parameters:
      - description: 세션 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 성공적으로 만료 처리됨
      security:
      - AdminAuth: []
      summary: 관리자 세션 강제 종료
      tags:
      - A. Auth & Device Trust
  /auth/track/{trackId}/force-logout:
    post:
      description: 관리자가 특정 트랙의 진행자 세션을 강제 종료시킨다.
      parameters:
      - description: 트랙 ID
        in: path
        name: trackId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 성공
      security:
      - AdminAuth: []
      summary: 트랙 강제 로그아웃
      tags:
      - A. Auth & Device Trust
  /auth/track/lockout/{deviceId}/release:
    post:
      description: 관리자가 PIN 다회 오류로 잠긴 기기를 해제한다.
      parameters:
      - description: 기기 ID
        in: path
        name: deviceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 성공
      security:
      - AdminAuth: []
      summary: 디바이스 락아웃 해제
      tags:
      - A. Auth & Device Trust
  /auth/track/login:
    post:
      consumes:
      - application/json
      description: 신뢰 기기에서 트랙 PIN 으로 로그인하여 트랙 세션 토큰을 발급받는다.
      parameters:
      - description: 6자리 숫자 트랙 PIN
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.TrackLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 로그인 성공 — 트랙 세션 토큰 발급
          schema:
            $ref: '#/definitions/web.TrackLoginResponse'
        "400":
          description: 잘못된 PIN (지연 가능)
          schema:
            $ref: '#/definitions/web.ErrorResponse'
        "403":
          description: 신뢰 기기 아님 또는 캠프 미시작
          schema:
            $ref: '#/definitions/web.ErrorResponse'
        "429":
          description: PIN 잠금(지연) 중
          schema:
            $ref: '#/definitions/web.ErrorResponse'
      security:
      - TrustedDeviceAuth: []
      summary: 진행자 트랙 PIN 로그인
      tags:
      - A. Auth & Device Trust
  /auth/track/logout:
    post:
      description: 트랙 진행자가 스스로 로그아웃한다.
      produces:
      - application/json
      responses:
        "204":
          description: 성공
      security:
      - TrackAuth: []
      summary: 진행자 트랙 로그아웃
      tags:
      - A. Auth & Device Trust
  /badges:
    get:
      description: 시스템에 존재하는 전체 배지 목록을 조회한다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.Badge'
            type: array
      security:
      - AdminAuth: []
      summary: 전체 배지 목록 조회
      tags:
      - B. Resource Management (Admin)
  /badges/{id}/register:
    post:
      consumes:
      - application/json
      description: 수동으로 특정 배지를 조회하여 조에 할당한다.
      parameters:
      - description: 배지 ID
        in: path
        name: id
        required: true
        type: string
      - description: 배정할 조 ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AssignBadgeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.Badge'
      security:
      - AdminAuth: []
      summary: 배지를 특정 조에 배정 (수동)
      tags:
      - B. Resource Management (Admin)
  /badges/bulk-generate:
    post:
      consumes:
      - application/json
      description: 특정 개수만큼 QR 배지를 대량으로 일괄 발급한다.
      parameters:
      - description: 생성할 개수
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.BulkGenerateBadgesRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/web.Badge'
            type: array
      security:
      - AdminAuth: []
      summary: 초기 배지 일괄 생성
      tags:
      - B. Resource Management (Admin)
  /badges/export:
    get:
      description: 클라이언트가 직접 PDF 인쇄 및 레이아웃 구성을 할 수 있도록 미배정(UNASSIGNED) 배지 전체 목록을 JSON으로
        다운로드한다.
      produces:
      - application/json
      responses:
        "200":
          description: 미배정 배지 목록
          schema:
            $ref: '#/definitions/web.ExportBadgesResponse'
      security:
      - AdminAuth: []
      summary: QR 배지 인쇄용 목록 내보내기 (JSON)
      tags:
      - B. Resource Management (Admin)
  /badges/scan-register:
    post:
      consumes:
      - application/json
      description: QR 코드를 스캔하여 배지를 특정 조에 등록(매핑)한다.
      parameters:
      - description: 매핑 정보
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.ScanAssignBadgeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/web.Group'
      security:
      - AdminAuth: []
      summary: 배지를 특정 조에 배정 (스캔 기반)
      tags:
      - B. Resource Management (Admin)
  /camps:
    get:
      description: 전체 캠프 목록을 조회한다.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.Camp'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.ErrorResponse'
      security:
      - AdminAuth: []
      summary: 캠프 목록 조회
      tags:
      - B. Resource Management (Admin)
    post:
      consumes:
      - application/json
      description: 새로운 코너학습 캠프를 생성한다.
      parameters:
      - description: 캠프 생성 정보
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.CreateCampRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/web.Camp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/web.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/web.ErrorResponse'
      security:
      - AdminAuth: []
      summary: 새 캠프 생성
      tags:
